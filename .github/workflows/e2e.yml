name: e2e

on:
  pull_request:
  workflow_dispatch:

jobs:
  cloud-hypervisor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUD_HYPERVISOR_VERSION: v52.0
      E2E_ARTIFACT_DIR: _guest-agent-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Diagnose runner virtualization
        run: |
          echo "runner.os=${{ runner.os }}"
          echo "runner.arch=${{ runner.arch }}"
          uname -a
          id
          groups
          lscpu
          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm is required for the Cloud Hypervisor e2e test but is not present on this runner"
            ls -la /dev
            exit 1
          fi
          ls -l /dev/kvm

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.2"

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            acl \
            busybox-static \
            ca-certificates \
            cpio \
            curl \
            gzip \
            jq \
            linux-image-kvm \
            xz-utils \
            zstd

      - name: Install Cloud Hypervisor
        run: |
          curl -fsSL \
            "https://github.com/cloud-hypervisor/cloud-hypervisor/releases/download/${CLOUD_HYPERVISOR_VERSION}/cloud-hypervisor-static" \
            -o cloud-hypervisor
          chmod +x cloud-hypervisor
          sudo install -m 0755 cloud-hypervisor /usr/local/bin/cloud-hypervisor
          cloud-hypervisor --version

      - name: Configure KVM access
        run: |
          ls -l /dev/kvm
          test -e /dev/kvm
          sudo setfacl -m "u:${USER}:rw" /dev/kvm
          ls -l /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm

      - name: Make kernel readable
        run: |
          # linux-image-kvm installs /boot/vmlinuz-* as root-only (0600).
          # Cloud Hypervisor runs as the runner user and must read the kernel.
          ls -l /boot/vmlinuz-* || true
          sudo chmod 0644 /boot/vmlinuz-*
          ls -l /boot/vmlinuz-*

      - name: Unit tests
        run: make test

      - name: Cloud Hypervisor e2e
        run: make e2e

      - name: Upload e2e logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: cloud-hypervisor-e2e-logs
          path: test/e2e/${{ env.E2E_ARTIFACT_DIR }}
          if-no-files-found: ignore
