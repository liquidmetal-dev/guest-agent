name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout apt repository
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/checkout@v7
        with:
          repository: liquidmetal-dev/apt-repo
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo

      - name: Install apt repository tools
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev gnupg

      - name: Publish apt repository
        if: ${{ !contains(github.ref_name, '-') }}
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          if ! [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Skipping apt publish for non-stable tag: ${GITHUB_REF_NAME}"
            exit 0
          fi

          git -C apt-repo config user.name "github-actions[bot]"
          git -C apt-repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          export GNUPGHOME="${RUNNER_TEMP}/apt-gpg"
          mkdir -p "${GNUPGHOME}"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${APT_GPG_PRIVATE_KEY}" | gpg --batch --import

          scripts/publish-apt-repo.sh dist apt-repo
